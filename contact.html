<!DOCTYPE html>
<html>
<head>
<title>Contact EarnPro Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ICONS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#6c5ce7,#00cec9);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

/* GLASS CARD */
.glass{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
border-radius:20px;
padding:40px;
width:100%;
max-width:900px;
color:#fff;
box-shadow:0 10px 40px rgba(0,0,0,0.2);
animation:fadeUp 1s ease;
}

/* HEADINGS */
.glass h1{
font-size:30px;
margin-bottom:10px;
}

.glass p{
color:#eee;
margin-bottom:20px;
}

/* INPUTS */
.input-box{
margin-bottom:15px;
}

.input-box input,
.input-box textarea{
width:100%;
padding:12px;
border:none;
border-radius:10px;
outline:none;
font-size:14px;
}

/* BUTTON */
.btn{
margin-top:10px;
padding:12px;
width:100%;
background:#fff;
color:#6c5ce7;
border:none;
border-radius:10px;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
transform:scale(1.03);
background:#f1f1f1;
}

/* SOCIAL PRO */
.social-pro{
margin-top:25px;
display:flex;
gap:15px;
flex-wrap:wrap;
}

.social-btn{
display:flex;
align-items:center;
gap:10px;
padding:12px 18px;
border-radius:12px;
text-decoration:none;
font-weight:600;
color:#fff;
backdrop-filter:blur(10px);
background:rgba(255,255,255,0.1);
transition:0.3s;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

.social-btn i{
font-size:18px;
}

/* COLORS */
.telegram{background:linear-gradient(135deg,#0088cc,#00c6ff);}
.youtube{background:linear-gradient(135deg,#ff0000,#ff4d4d);}
.whatsapp{background:linear-gradient(135deg,#25D366,#128C7E);}

/* HOVER */
.social-btn:hover{
transform:translateY(-3px) scale(1.05);
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

/* BACK BTN */
.back{
display:inline-block;
margin-top:25px;
padding:10px 20px;
background:#fff;
color:#6c5ce7;
border-radius:8px;
text-decoration:none;
}

/* ANIMATION */
@keyframes fadeUp{
from{opacity:0;transform:translateY(40px);}
to{opacity:1;transform:translateY(0);}
}

/* FLOAT BG */
body::before{
content:'';
position:absolute;
width:300px;
height:300px;
background:#fff;
opacity:0.1;
border-radius:50%;
top:10%;
left:10%;
animation:float 6s infinite ease-in-out;
}

@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(30px)}
}
</style>

</head>

<body>

<div class="glass">

<h1>📩 Contact EarnPro Hub</h1>
<p>Have questions or business inquiries? Send us a message.</p>

<form onsubmit="sendMessage(event)">
<div class="input-box">
<input type="text" id="name" placeholder="Your Name" required>
</div>

<div class="input-box">
<input type="email" id="email" placeholder="Your Email" required>
</div>

<div class="input-box">
<textarea id="message" rows="4" placeholder="Your Message" required></textarea>
</div>

<button type="submit" class="btn">🚀 Send Message</button>
</form>

<!-- SOCIAL -->
<div class="social-pro">

<a href="https://t.me/yourchannel" target="_blank" class="social-btn telegram">
<i class="fab fa-telegram-plane"></i>
<span>Telegram</span>
</a>

<a href="https://youtube.com/@yourchannel" target="_blank" class="social-btn youtube">
<i class="fab fa-youtube"></i>
<span>YouTube</span>
</a>

<a href="https://wa.me/91XXXXXXXXXX" target="_blank" class="social-btn whatsapp">
<i class="fab fa-whatsapp"></i>
<span>WhatsApp</span>
</a>

</div>

<a href="index.html" class="back">⬅ Back to Home</a>

</div>

<script>
function sendMessage(e){
e.preventDefault();
alert("✅ Message Sent Successfully!");
}
</script>

</body>
</html>
